<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Commissions | Katt</title>
  <link rel="icon" href="data:,">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* 1. Global Resets */
    * {
      box-sizing: border-box; /* Ensures padding doesn't break the width */
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh; /* Changed from height to min-height */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      color: #f0f0f0;
      padding: 40px 20px; /* Gives space for the container to breathe */
      overflow-x: hidden;
      overflow-y: auto; /* Allows scrolling if content is long */
    }

    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      z-index: -1;
      object-fit: cover;
      filter: brightness(0.4);
    }

    /* 2. Frosted Glass Container - The "Main" Box */
    .tab-container {
      width: 100%;
      max-width: 900px;
      height: auto; /* Box now grows with its content */
      background: rgba(15, 15, 15, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 3rem;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.6s ease-out;
      display: flex;
      flex-direction: column;
    }

    h2 {
      margin-bottom: 1rem;
      font-size: 2.2rem;
      font-weight: 600;
    }

    p {
      line-height: 1.6;
      margin-bottom: 15px;
      font-weight: 300;
      color: #dbdee1;
    }

    strong {
      color: #fff;
    }

    /* 3. Horizontal Card Layout */
    #pay-embeds {
      display: flex;
      flex-direction: row; 
      gap: 20px;
      margin-top: 2rem;
      width: 100%;
    }

    .modern-card {
      flex: 1;
      background: rgba(43, 45, 49, 0.6);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }

    .modern-card:hover {
      transform: translateY(-8px);
      background: rgba(43, 45, 49, 0.85);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .card-icon {
      width: 100px;
      height: 100px;
      border-radius: 18px;
      object-fit: cover;
      margin-bottom: 18px;
      background: #313338;
      box-shadow: 0 8px 15px rgba(0,0,0,0.4);
    }

    .card-body h3 {
      font-size: 1.3rem;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .card-body p {
      font-size: 0.85rem;
      color: #b5bac1;
      margin-bottom: 20px;
      min-height: 70px; /* Keeps text boxes uniform */
    }

    /* 4. Pricing & Buttons */
    .card-footer {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .price-tag {
      font-weight: 600;
      color: #57F287;
      font-size: 1.2rem;
    }

    .btn-pay {
      background: #5865F2;
      color: white;
      text-decoration: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      width: 100%;
      text-align: center;
      transition: background 0.2s, transform 0.2s;
    }

    .btn-pay:hover {
      background: #4752c4;
      transform: scale(1.02);
    }

    /* 5. Animations & Mobile Responsiveness */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 800px) {
      #pay-embeds {
        flex-direction: column; /* Stacks cards on mobile so they don't squash */
      }
      .tab-container {
        padding: 2rem;
      }
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
  </style>
</head>
<body>

  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4">
  </video>

  <div class="tab-container">
    <h2>Welcome to my commissions!</h2>
    <p>I am currently offering commissions for <strong>OC icons</strong> and <strong>Minecraft mods</strong>. Message me on Discord (<strong>kattstarz</strong>) with your details and transaction ID.</p>
    
    <div id="pay-embeds"></div>

    <p style="margin-top: 3rem; font-size: 0.8rem; opacity: 0.5; text-align: center;">
      Portfolio: <a href="https://gootraxian.github.io/Blog/" target="_blank">gootraxian.github.io/Blog/</a>
    </p>
  </div>

  <script>
    const products = [
      { 
        name: 'Mod Commission', 
        price: '10 USD', 
        url: 'https://moonpay.hel.io/x/kattomods',
        desc: 'Commission a mod, or your **oc inside mine**! Get your own mod, or character inside **Changed Extras**. Includes models, textures, and code.',
        image: 'mod.png' 
      },
      { 
        name: 'Icon', 
        price: '5 USD', 
        url: 'https://moonpay.hel.io/x/kattoicon',
        desc: 'Headshot of your character! **Any expression**, you can request circular or square.',
        image: 'icon.png' 
      }
    ];

    function renderCards() {
      const container = document.getElementById('pay-embeds');
      
      products.forEach(prod => {
        const card = document.createElement('div');
        card.className = 'modern-card';
        
        const cleanDesc = prod.desc.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        card.innerHTML = `
          <img src="${prod.image}" alt="${prod.name}" class="card-icon">
          <div class="card-body">
            <h3>${prod.name}</h3>
            <p>${cleanDesc}</p>
            <div class="card-footer">
              <span class="price-tag">${prod.price}</span>
              <a href="${prod.url}" target="_blank" class="btn-pay">Pay with Hel.io</a>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    document.addEventListener('DOMContentLoaded', renderCards);
  </script>
</body>
</html>
