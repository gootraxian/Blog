<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Commissions | Katt</title>
  <link rel="icon" href="data:,">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* 1. Global & Background Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      color: #f0f0f0;
      overflow: hidden; /* Prevents double scrollbars */
    }

    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      z-index: -1;
      object-fit: cover;
      filter: brightness(0.4);
    }

    /* 2. Frosted Glass Container */
    .tab-container {
      width: 95%;
      max-width: 900px;
      background: rgba(15, 15, 15, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 2.5rem;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.6s ease-out;
    }

    h2 {
      margin-bottom: 1rem;
      font-size: 2rem;
      font-weight: 600;
    }

    p {
      line-height: 1.6;
      margin-bottom: 15px;
      font-weight: 300;
      color: #dbdee1;
    }

    strong {
      color: #fff;
      font-weight: 600;
    }

    a {
      color: #5865F2;
      text-decoration: none;
      transition: 0.2s;
    }

    a:hover {
      text-decoration: underline;
    }

    /* 3. Horizontal Card Layout */
    #pay-embeds {
      display: flex;
      flex-direction: row; /* Forces side-by-side */
      gap: 20px;
      margin-top: 2rem;
    }

    .modern-card {
      flex: 1;
      background: rgba(43, 45, 49, 0.7);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .modern-card:hover {
      transform: translateY(-8px);
      background: rgba(43, 45, 49, 0.9);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .card-icon {
      width: 90px;
      height: 90px;
      border-radius: 16px;
      object-fit: cover;
      margin-bottom: 15px;
      background: #313338;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .card-body h3 {
      font-size: 1.25rem;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .card-body p {
      font-size: 0.9rem;
      color: #b5bac1;
      margin-bottom: 20px;
      min-height: 45px; /* Keeps buttons aligned even with different text lengths */
    }

    /* 4. Pricing & Button Styles */
    .card-footer {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .price-tag {
      font-weight: 600;
      color: #57F287; /* Discord Green */
      font-size: 1.15rem;
      text-shadow: 0 0 10px rgba(87, 242, 135, 0.2);
    }

    .btn-pay {
      background: #5865F2; /* Discord Blurple */
      color: white;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      width: 100%;
      transition: background 0.2s, transform 0.2s;
    }

    .btn-pay:hover {
      background: #4752c4;
      transform: scale(1.03);
    }

    /* 5. Animations & Responsive */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      #pay-embeds {
        flex-direction: column; /* Stack vertically on mobile */
      }
      .tab-container {
        padding: 1.5rem;
        height: 95vh;
        overflow-y: auto;
      }
      body {
        overflow-y: auto;
      }
    }
  </style>
</head>
<body>

  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4">
  </video>

  <div class="tab-container">
    <div class="tab-content">
      <h2>Commissions</h2>
      <p>I am currently offering commissions for <strong>OC icons</strong> and <strong>Minecraft mods</strong>. To request one, please message me on Discord (<strong>kattstarz</strong>) with the details and your transaction ID.</p>
      
      <div id="pay-embeds"></div>

      <p style="margin-top: 2.5rem; font-size: 0.8rem; opacity: 0.6; text-align: center;">
        Portfolio: <a href="https://gootraxian.github.io/Blog/" target="_blank">gootraxian.github.io/Blog/</a>
      </p>
    </div>
  </div>

  <script>
    /* PRODUCT DATA
       Update the descriptions and images here. 
       Note: **text** will automatically become bold.
    */
    const products = [
      { 
        name: 'Minecraft Mods', 
        price: '10 USD', 
        url: 'https://moonpay.hel.io/x/kattomods',
        desc: 'Commission a custom **Minecraft mod** tailored specifically to your gameplay needs.',
        image: 'https://placehold.co/400x400/2b2d31/ffffff?text=MODS' 
      },
      { 
        name: 'OC Icons', 
        price: '5 USD', 
        url: 'https://moonpay.hel.io/x/kattoicon',
        desc: 'Get a high-quality, modern **OC icon** commission. Send your references on Discord!',
        image: 'https://placehold.co/400x400/2b2d31/ffffff?text=ICONS' 
      }
    ];

    function renderCards() {
      const container = document.getElementById('pay-embeds');
      
      products.forEach(prod => {
        const card = document.createElement('div');
        card.className = 'modern-card';
        
        // Converts markdown style **bold** to <strong> HTML tags
        const cleanDesc = prod.desc.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        card.innerHTML = `
          <img src="${prod.image}" alt="${prod.name}" class="card-icon">
          <div class="card-body">
            <h3>${prod.name}</h3>
            <p>${cleanDesc}</p>
            <div class="card-footer">
              <span class="price-tag">$${prod.price}</span>
              <a href="${prod.url}" target="_blank" class="btn-pay">Pay with Hel.io</a>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Initialize the page
    window.addEventListener('DOMContentLoaded', renderCards);
  </script>
</body>
</html>
