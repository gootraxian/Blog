<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Commissions | Katt</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4">
  </video>

  <div class="tab-container">
    <div class="tab-content active" id="home">
      <h2>Commissions</h2>
      <p>I am currently offering <strong>OC icons</strong> and <strong>Minecraft mods</strong>. Message me on Discord (<strong>kattstarz</strong>) with your details and transaction ID!</p>
      
      <div id="pay-embeds">
        </div>

      <p style="margin-top: 2rem; font-size: 0.8rem; opacity: 0.7;">
        Portfolio: <a href="https://gootraxian.github.io/Blog/">gootraxian.github.io/Blog/</a>
      </p>
    </div>
  </div>

  <script>
    const products = [
      { url: 'https://moonpay.hel.io/x/kattomods', price: '10 USD', name: 'Mods' },
      { url: 'https://moonpay.hel.io/x/kattoicon', price: '5 USD', name: 'Icons' }
    ];

    async function loadEmbeds() {
      const container = document.getElementById('pay-embeds');
      
      for (const prod of products) {
        try {
          const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(prod.url)}`);
          const data = await response.json();
          const parser = new DOMParser();
          const doc = parser.parseFromString(data.contents, 'text/html');

          const image = doc.querySelector('meta[property="og:image"]')?.content || 'https://via.placeholder.com/100';
          const description = doc.querySelector('meta[property="og:description"]')?.content || `Custom ${prod.name} commission.`;

          const card = document.createElement('div');
          card.className = 'modern-card';
          card.innerHTML = `
            <img src="${image}" alt="${prod.name}" class="card-icon">
            <div class="card-body">
              <h3>${prod.name}</h3>
              <p>${description.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>
              <div class="card-footer">
                <span class="price-tag">$${prod.price}</span>
                <a href="${prod.url}" target="_blank" class="btn-pay">Pay with Hel.io</a>
              </div>
            </div>
          `;
          container.appendChild(card);
        } catch (e) {
          console.error("Failed to load product metadata", e);
        }
      }
    }

    loadEmbeds();
  </script>
</body>
</html>
